<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Solv</title>
<style>
  :root{
    --bg:#0b0c12; --panel:#14161f; --panel2:#191c27; --line:#272c3b; --ink:#eef1f8; --mut:#9aa3b6;
    --g1:#6c8cff; --g2:#9b6cff; --g3:#ff7eb6; --good:#3ad29f; --warn:#ffcf6b; --bad:#ff6b7d;
    --grad:linear-gradient(120deg,var(--g1),var(--g2) 55%,var(--g3));
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;
    --mono:ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:
      radial-gradient(700px 360px at 110% -10%,rgba(155,108,255,.18),transparent),
      radial-gradient(600px 300px at -10% 0%,rgba(108,140,255,.16),transparent),
      var(--bg);
    color:var(--ink);font-family:var(--sans);display:flex;flex-direction:column;font-size:14px}

  .top{display:flex;align-items:center;justify-content:space-between;padding:12px 14px}
  .brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px;letter-spacing:-.01em}
  .brand .logo{width:22px;height:22px;border-radius:7px;background:var(--grad);display:grid;place-items:center;color:#fff;font-size:12px;box-shadow:0 4px 14px rgba(108,140,255,.5)}
  .brand .grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .icon-btn{background:var(--panel2);border:1px solid var(--line);color:var(--mut);border-radius:9px;width:30px;height:30px;cursor:pointer;font-size:14px}
  .icon-btn:hover{color:var(--ink)}

  .controls{display:flex;gap:8px;padding:0 14px 10px}
  select{flex:1;min-width:0;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:9px 10px;font-size:12.5px;font-family:inherit;outline:none}
  select:focus{border-color:var(--g1)}
  .modes{display:flex;gap:5px;padding:0 14px 12px;flex-wrap:wrap}
  .mode{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--mut);border-radius:9px;padding:7px 4px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;min-width:60px}
  .mode:hover{color:var(--ink)}
  .mode.on{color:#fff;border-color:transparent;background:var(--grad);box-shadow:0 4px 16px rgba(124,108,255,.4)}

  .convo{flex:1;overflow-y:auto;padding:6px 14px 14px;display:flex;flex-direction:column;gap:14px}
  .empty{margin:auto;text-align:center;color:var(--mut);padding:30px 10px}
  .empty .big{font-size:30px;margin-bottom:10px}
  .empty kbd{background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:11px}

  .msg{display:flex;flex-direction:column;gap:6px;animation:rise .2s ease}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .bubble-user{align-self:flex-end;max-width:88%;background:var(--panel2);border:1px solid var(--line);border-radius:14px 14px 4px 14px;padding:9px 12px;font-size:13px}
  .bubble-user img{max-width:160px;border-radius:8px;display:block;margin-top:6px}
  .ans{align-self:stretch}
  .final{padding:12px 14px;border-radius:14px;background:linear-gradient(180deg,rgba(108,140,255,.16),rgba(155,108,255,.07));border:1px solid rgba(124,140,255,.4)}
  .final .fhead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
  .final .lab{font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .final .txt{font-size:15px;font-weight:600;color:#fff;line-height:1.45}
  .final .meta{margin-top:8px;font-size:11px;color:var(--mut)}
  .cbadge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;color:#061018;background:var(--good);white-space:nowrap}
  .cbadge[data-tone="warn"]{background:var(--warn)}.cbadge[data-tone="bad"]{background:var(--bad);color:#2a0a10}
  .choice{display:flex;align-items:center;gap:12px}
  .cbadge-letter{flex:0 0 auto;width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:22px;font-weight:800;color:#fff;background:var(--grad);box-shadow:0 6px 18px rgba(124,108,255,.5)}
  details.reason{margin-top:8px;border:1px solid var(--line);border-radius:11px;background:var(--panel)}
  details.reason summary{cursor:pointer;padding:9px 12px;font-size:12px;font-weight:600;color:var(--mut);list-style:none}
  details.reason summary::-webkit-details-marker{display:none}
  details.reason summary::before{content:"▸ ";color:var(--g1)}
  details.reason[open] summary::before{content:"▾ "}
  .reason-body{padding:0 12px 12px;color:var(--ink)}
  .conf{margin-top:10px}
  .conf-row{display:flex;justify-content:space-between;font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em}
  .conf-num{font-weight:700;color:var(--ink)}
  .track{height:7px;border-radius:999px;background:#0e1018;margin-top:6px;overflow:hidden}
  .fill{height:100%;width:0;border-radius:999px;background:var(--grad);transition:width .5s cubic-bezier(.2,.8,.2,1)}
  .fill[data-tone="warn"]{background:linear-gradient(90deg,#ffcf6b,#ff9f43)}
  .fill[data-tone="bad"]{background:linear-gradient(90deg,#ff8a8a,#ff6b7d)}
  .verify{margin-top:9px;font-size:12.5px}
  .badge{display:inline-block;padding:4px 10px;border-radius:999px;font-weight:600;font-size:12px}
  .badge.good{color:var(--good);background:rgba(58,210,159,.12)}
  .badge.bad{color:var(--bad);background:rgba(255,107,125,.12)}
  .status{color:var(--mut);font-size:12.5px}
  .dots{display:inline-flex;gap:3px;vertical-align:middle;margin-right:5px}
  .dots i{width:5px;height:5px;border-radius:50%;background:var(--g1);animation:b 1s infinite ease-in-out}
  .dots i:nth-child(2){animation-delay:.15s}.dots i:nth-child(3){animation-delay:.3s}
  @keyframes b{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-4px);opacity:1}}

  /* error card */
  .err{border:1px solid rgba(255,107,125,.4);background:rgba(255,107,125,.07);border-radius:12px;padding:11px 13px}
  .err .t{font-weight:700;color:#ffb3bd;margin-bottom:6px}
  .err ol{margin:0 0 8px;padding-left:18px;color:var(--mut);font-size:12.5px}
  .err .row{display:flex;gap:8px}

  /* markdown */
  .ans code,.bubble-user code,.reason-body code{background:#0e1018;border:1px solid var(--line);padding:1px 5px;border-radius:5px;font-size:12.5px;font-family:var(--mono)}
  .ans pre{background:#0e1018;border:1px solid var(--line);border-radius:9px;padding:10px;overflow-x:auto;font-size:12.5px;font-family:var(--mono)}
  .solv-h1{font-weight:700;color:#fff;margin:8px 0 3px}.solv-h2{font-weight:700;color:#e3e8f5;margin:6px 0 3px}
  .solv-li{margin:2px 0}.ans blockquote{border-left:3px solid var(--g1);margin:6px 0;padding:2px 0 2px 10px;color:var(--mut)}
  .ans hr{border:none;border-top:1px solid var(--line);margin:8px 0}
  .solv-table{border-collapse:collapse;width:100%;margin:8px 0;font-size:12.5px}
  .solv-table th,.solv-table td{border:1px solid var(--line);padding:5px 8px;text-align:left}
  .solv-table th{background:#0e1018;color:#cdd6ff}

  /* composer */
  .composer{border-top:1px solid var(--line);background:rgba(13,15,22,.7);backdrop-filter:blur(8px);padding:10px 12px}
  .attach-chip{display:inline-flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:5px 8px;font-size:11.5px;color:var(--mut);margin-bottom:8px}
  .attach-chip img{height:26px;border-radius:5px}
  .attach-chip button{background:none;border:none;color:var(--mut);cursor:pointer}
  .input-row{display:flex;gap:8px;align-items:flex-end}
  textarea{flex:1;resize:none;max-height:120px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:12px;padding:10px 12px;font-size:13.5px;font-family:inherit;outline:none;line-height:1.4}
  textarea:focus{border-color:var(--g1)}
  .send,.attach{border:none;border-radius:12px;cursor:pointer;font-size:16px;height:40px}
  .attach{width:40px;background:var(--panel2);border:1px solid var(--line);color:var(--mut)}
  .attach:hover{color:var(--ink)}
  .send{width:44px;background:var(--grad);color:#fff;font-weight:700;box-shadow:0 6px 18px rgba(124,108,255,.45)}
  .send:disabled{opacity:.5;cursor:default;box-shadow:none}
  .hint{font-size:11px;color:var(--mut);margin-top:7px}
  a{color:var(--g1)}
</style>
</head>
<body>
  <div class="top">
    <div class="brand"><span class="logo">✦</span> <span>Sol<span class="grad">v</span></span></div>
    <button class="icon-btn" id="gear" title="Settings">⚙</button>
  </div>
  <div class="controls">
    <select id="provider"></select>
    <select id="model"></select>
  </div>
  <div class="modes" id="modes"></div>

  <div class="convo" id="convo">
    <div class="empty" id="empty">
      <div class="big">✦</div>
      <div>Ask a question, paste a screenshot, or attach an image.</div>
      <div style="margin-top:10px;font-size:12.5px">On any page you can also select text and click <b>Solve</b>, or press <kbd>Alt</kbd>+<kbd>A</kbd> / <kbd>Alt</kbd>+<kbd>S</kbd>.</div>
    </div>
  </div>

  <div class="composer">
    <div id="attachWrap"></div>
    <div class="input-row">
      <button class="attach" id="attach" title="Attach image">🖼</button>
      <input type="file" id="file" accept="image/*" hidden />
      <textarea id="input" rows="1" placeholder="Type or paste a question…"></textarea>
      <button class="send" id="send" title="Send (Enter)">➤</button>
    </div>
    <div class="hint" id="hint"></div>
  </div>

  <script src="config.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
