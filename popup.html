<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  :root{
    --bg:#f5f7fa;--panel:#ffffff;--line:rgba(15,23,42,.1);--ink:#111827;--mut:#64748b;
    --g1:#0070ba;--g2:#003087;--g3:#6b7f99;--good:#087a55;
    --grad:linear-gradient(135deg,var(--g1),var(--g2));
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  button,select,input{touch-action:manipulation}
  button:focus-visible,select:focus-visible,input:focus-visible{outline:2px solid rgba(15,23,42,.34);outline-offset:2px}
  body{width:308px;margin:0;font-family:var(--sans);color:var(--ink);
    background:var(--bg);padding:14px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  .brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px;margin-bottom:14px}
  .logo{width:22px;height:22px;border-radius:7px;background:var(--grad);display:grid;place-items:center;color:#fff;font-size:12px}
  .icon{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .grad{color:var(--g1)}
  label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--mut);margin:11px 0 5px}
  select,input{width:100%;background:#f7f9fb;border:0;color:var(--ink);
    border-radius:16px;padding:11px 12px;font-size:16px;font-family:inherit;outline:none}
  select:focus,input:focus{background:#fff}
  .hint{font-size:11px;color:var(--mut);margin-top:7px;line-height:1.45}
  .row{display:flex;gap:8px;margin-top:14px}
  button{flex:1;border:none;color:#fff;font-weight:700;font-size:13px;min-height:44px;padding:11px;border-radius:999px;cursor:pointer;font-family:inherit;
    background:var(--g1);transition:filter .15s ease,transform .1s ease,border-color .15s ease}
  button.ghost{background:#edf2f6;border:0;color:var(--ink);box-shadow:none;font-weight:600}
  @media (hover:hover) and (pointer:fine){button:hover{filter:brightness(.98)}button.ghost:hover{background:#f4f7fa}}
  button:active{transform:scale(.97)}
  .status{font-size:11px;color:var(--good);height:14px;margin-top:9px;text-align:center;opacity:0;transition-property:opacity;transition-duration:.2s}
  .status.bad{color:#c2415a}
  .status.show{opacity:1}
  kbd{background:#edf2f6;border:0;border-radius:7px;padding:2px 6px;font-size:10px}
</style>
<link rel="stylesheet" href="ui.css" />
</head>
<body class="popup-page">
  <div class="brand"><span class="logo">S</span> Sol<span class="grad">v</span></div>

  <label for="provider">Provider</label>
  <select id="provider"></select>

  <label for="model">Model</label>
  <select id="model"></select>
  <input id="modelCustom" type="text" placeholder="custom model id" autocomplete="off" spellcheck="false" data-lpignore="true" data-1p-ignore hidden style="margin-top:7px" />
  <div class="hint" id="keyHint"></div>

  <div class="row">
    <button id="save"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg>Save</button>
    <button class="ghost" id="side"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="3"/><path d="M9 4v16"/></svg>Side panel</button>
  </div>
  <div class="row" style="margin-top:8px">
    <button class="ghost" id="opts"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 21v-7"/><path d="M4 10V3"/><path d="M12 21v-9"/><path d="M12 8V3"/><path d="M20 21v-5"/><path d="M20 12V3"/><path d="M2 14h4"/><path d="M10 8h4"/><path d="M18 16h4"/></svg>Settings &amp; help</button>
  </div>
  <div class="status" id="status">Saved</div>
  <div class="hint" style="margin-top:12px">
    On any page: select text → click <b>Solve</b>, or <kbd>Alt</kbd>+<kbd>A</kbd> (text) /
    <kbd>Alt</kbd>+<kbd>S</kbd> (screenshot).
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
