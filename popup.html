<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  :root{
    --bg:#0d0f16;--panel:#171a23;--line:#272c3b;--ink:#eef1f8;--mut:#9aa3b6;
    --g1:#6c8cff;--g2:#9b6cff;--g3:#ff7eb6;--good:#3ad29f;
    --grad:linear-gradient(120deg,var(--g1),var(--g2) 55%,var(--g3));
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  button,select,input{touch-action:manipulation}
  button:focus-visible,select:focus-visible,input:focus-visible{outline:2px solid rgba(255,255,255,.72);outline-offset:2px}
  body{width:308px;margin:0;font-family:var(--sans);color:var(--ink);
    background:radial-gradient(420px 200px at 110% -20%,rgba(155,108,255,.16),transparent),var(--bg);padding:14px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  .brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px;margin-bottom:14px}
  .logo{width:22px;height:22px;border-radius:7px;background:var(--grad);display:grid;place-items:center;color:#fff;font-size:12px;box-shadow:0 4px 14px rgba(124,108,255,.5)}
  .grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--mut);margin:11px 0 5px}
  select,input{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--ink);
    border-radius:8px;padding:9px 10px;font-size:16px;font-family:inherit;outline:none}
  select:focus,input:focus{border-color:var(--g1)}
  .hint{font-size:11px;color:var(--mut);margin-top:7px;line-height:1.45}
  .row{display:flex;gap:8px;margin-top:14px}
  button{flex:1;border:none;color:#fff;font-weight:700;font-size:13px;min-height:38px;padding:10px;border-radius:8px;cursor:pointer;font-family:inherit;
    background:var(--grad);box-shadow:0 5px 16px rgba(124,108,255,.4);transition:filter .15s ease,transform .1s ease}
  button.ghost{background:var(--panel);border:1px solid var(--line);color:var(--ink);box-shadow:none;font-weight:600}
  @media (hover:hover) and (pointer:fine){button:hover{filter:brightness(1.06)}button.ghost:hover{background:#1b1f2b}}
  button:active{transform:scale(.97)}
  .status{font-size:11px;color:var(--good);height:14px;margin-top:9px;text-align:center;opacity:0;transition:.2s}
  .status.show{opacity:1}
  kbd{background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-size:10px}
</style>
</head>
<body>
  <div class="brand"><span class="logo">✦</span> Sol<span class="grad">v</span></div>

  <label>Provider</label>
  <select id="provider"></select>

  <label>Model</label>
  <select id="model"></select>
  <input id="modelCustom" placeholder="custom model id" hidden style="margin-top:7px" />
  <div class="hint" id="keyHint"></div>

  <div class="row">
    <button id="save">Save</button>
    <button class="ghost" id="side">Side panel</button>
  </div>
  <div class="row" style="margin-top:8px">
    <button class="ghost" id="opts">Settings &amp; help</button>
  </div>
  <div class="status" id="status">Saved</div>
  <div class="hint" style="margin-top:12px">
    On any page: select text → click <b>Solve</b>, or <kbd>Alt</kbd>+<kbd>A</kbd> (text) /
    <kbd>Alt</kbd>+<kbd>S</kbd> (screenshot).
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
